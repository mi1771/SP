<!doctype html>
<html lang="en">
<head>
  <!-- Yoco Web SDK (Explicitly the very first item inside <head> to load first) -->
  <script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yoco &amp; Web3Forms Sandbox Demo</title>
  
  <!-- Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --input-bg: rgba(31, 41, 55, 0.5);
      --input-border: rgba(255, 255, 255, 0.08);
      --input-focus-border: #6366f1;
      --accent-color: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-color);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Standard container centering */
    .demo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
    }

    .payment-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    /* Card glow effect */
    .payment-card::before {
      content: '';
      position: absolute;
      top: -150px;
      right: -150px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
      pointer-events: none;
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .card-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.95rem;
      color: var(--text-color);
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .cart-summary {
      background: rgba(99, 102, 241, 0.08);
      border: 1px dashed rgba(99, 102, 241, 0.25);
      border-radius: 16px;
      padding: 18px;
      margin: 25px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-label {
      font-weight: 500;
      color: var(--text-muted);
    }

    .cart-total {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-color);
    }

    .pay-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary-color) 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 20px -3px rgba(99, 102, 241, 0.4);
    }

    .pay-btn:active {
      transform: translateY(0);
    }

    .pay-btn:disabled {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    #statusMessage {
      margin-top: 15px;
      font-size: 0.9rem;
      text-align: center;
      min-height: 20px;
      transition: color 0.3s ease;
    }

    .status-error {
      color: #f87171;
    }

    .status-success {
      color: #34d399;
    }

    .status-loading {
      color: var(--accent-color);
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="payment-card">
      <h1 class="card-title">Pre-order Sandbox</h1>
      <p class="card-subtitle">Yoco Payment &amp; Web3Forms Integration Demo</p>
      
      <form id="paymentForm">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input type="text" id="fullName" class="form-input" placeholder="e.g. John Doe" required />
        </div>
        
        <div class="form-group">
          <label class="form-label" for="gradeClass">Grade / Class</label>
          <input type="text" id="gradeClass" class="form-input" placeholder="e.g. Grade 10A" required />
        </div>
        
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="e.g. john@example.com" required />
        </div>

        <div class="cart-summary">
          <span class="cart-label">Mock Order Total:</span>
          <span class="cart-total" id="displayTotal">R 50.00</span>
        </div>

        <button type="submit" id="payBtn" class="pay-btn">Pay with Yoco</button>
      </form>
      
      <div id="statusMessage"></div>
    </div>
  </div>

  <!-- Local custom script tag (script.js) at the very bottom of the body -->
  <script src="script.js"></script>
</body>
</html>
